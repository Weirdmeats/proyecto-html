<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/style.css" rel="stylesheet">
    <title>TAME IMPALA MARKET</title>
</head>
<body class="flex flex-col min-h-screen">

<!--header -->
<header class="flex flex-col bg-[rgba(59,67,72,255)] text-white">

        <!--header principal-->
    <div class="w-full max-w-6xl mx-auto flex justify-between items-center p-8">
        <!--logo+marca-->
        <div class="flex items-center space-x-4">
            <!--logo-->
            <a href="">
                <img src="./img/t&glogo.png" alt="" class="h-20 w-20">
            </a>
            <!--marca-->
            <h1 class="text-4xl text-white font-bold">Danfoss</h1>
            <!--mensaje-->
            <h3 class="text-gray-300 text-2xs relative -top-2">Bienvenidos a nuestra tienda online!</h3>
        </div>
        <!--navbar-->
        <nav class="flex items-center justify-end space-x-4">
            <a href="" class="text-gray-300 hover:bg-red-400">Mi cuenta</a>
            <a href="" class="text-gray-300 hover:bg-red-400">Contacto</a>
            <a href="" class="text-gray-300 hover:bg-red-400">About</a>
            <a href="" class="text-gray-300 hover:bg-red-400">Iniciar sesion</a>
            <a href="" class="text-gray-300 hover:bg-red-400">Mis compras</a>
        </nav>
    </div>
        <!--header inferior-->
    <div class="flex justify-start p-3 space-x-1 px-65 bg-white">
        <a href="#">
            <img src="./img/RedHouse.png" alt="" class="h-10 w-10 rounded-full">
        </a>
        <input class="bg-gray-200 text-black rounded-sm p-2" type="text">
        <button class="bg-gray-200 text-black px-1 py-1 hover:bg-red-400 rounded-sm">
            Buscar

        </button>
        <!--dropdown nav-->
        <div class="relative group">
            <button class="hover:bg-red-400 text-black">Guitarras Electricas▾</button>
            <div class="absolute hidden group-hover:block bg-black">
                <ul>
                    <li><h1 class="px-4 py-2">Estratocaster</h1></li>
                </ul>
            </div>

        </div>
    </div>
    





</header>

</body>
</html>
