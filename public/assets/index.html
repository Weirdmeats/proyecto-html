<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/style.css" rel="stylesheet">
    <title>TAME IMPALA MARKET</title>
</head>
<body class="flex flex-col min-h-screen">

<!--header -->
<header class="flex flex-col bg-[rgba(59,67,72,255)] text-white">

        <!--header principal-->
    <div class="w-full max-w-6xl mx-auto flex justify-between items-center p-8">
        <!--logo+marca-->
        <div class="flex items-center space-x-4">
            <!--logo-->
            <a href="index.html">
                <img src="./img/t&glogo.png" alt="logo" class="h-20 w-20">
            </a>
            <!--marca-->
            <a href="index.html" class="text-3xl text-white font-bold hover:bg-red-400">Danfoss</a>
            <!--mensaje-->
            <h3 class="text-gray-300 text-2xs relative -top-2">Tienda de instrumentos musicales online!</h3>
        </div>
        <!--navbar-->
        <nav class="flex items-center justify-end space-x-4">
            <a href="tienda.html" class="text-gray-300 hover:bg-red-400">Tienda</a>
            <a href="contacto.html" class="text-gray-300 hover:bg-red-400">Contacto</a>
            <a href="about.html" class="text-gray-300 hover:bg-red-400">About</a>
            <a href="login.html" class="text-gray-300 hover:bg-red-400">Iniciar sesion</a>
            <a href="carrito.html" class="text-gray-300 hover:bg-red-400">Mi carrito</a>
        </nav>
    </div>
        <!--header inferior-->
    <div class="flex justify-start p-3 space-x-1 px-65 bg-white">
        <a href="#">
            <img src="./img/RedHouse.png" alt="" class="h-10 w-10 rounded-full">
        </a>
        <form action="/buscar" method="get">
            <label class="text-sm text-gray-700">
                <input class="bg-gray-200 text-black rounded-sm p-2" type="text">
            </label>
            <button class="bg-gray-200 text-black px-1 py-1 hover:bg-red-400 rounded-sm">
                Buscar

            </button>
        </form>
        <!--dropdown nav-->
        <div>
            <div class="relative group bg-black">
                <label for="guitarras"></label>
                <select id="guitarras" name="guiatrras">
                    <option value="">Estratocaster</option>
                    <option value="">Estratocaster</option>
                    <option value="">Estratocaster</option>
                </select>

            </div>
        </div>
    </div>


</header>

<main class="flex-grow">
    <!--carrusel de imagenes-->
    <div class="flex justify-center items-center min-h-center bg-gray-200 p-4">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden w-full max-w-4xl">
            <div class="space-x-4 flex">
                <img src="https://audiomusicacl.vtexassets.com/arquivos/ids/191413/1-guitarra-electrica-fender-american-vintage-ii-1957-stratocaster-2-color-sunburst-1113234.jpg?v=638525238674170000" class="h-64 w-full " alt="">
                <img src="https://dojiw2m9tvv09.cloudfront.net/29454/product/e6sb2819.jpg" class="h-64 w-full " alt="">
                <img src="https://dojiw2m9tvv09.cloudfront.net/29454/product/l-g2-jb-22305.jpeg" class="h-64 w-full " alt="">


            </div>
            <div class="flex justify-center mt-4">
                <button class="bg-gray-880 rounded-full h-4 w-4 mx-1"></button>
                <button class="bg-gray-880 rounded-full h-4 w-4 mx-1"></button>
                <button class="bg-gray-880 rounded-full h-4 w-4 mx-1"></button>
            </div>
            <div class="flex justify-between items-center mt-4 px-4">
                <button class="bg-gray-300 rounded-full p-2">Anterior</button>
                <button class="bg-gray-300 rounded-full p-2">Siguiente</button>
            </div>

        </div>
    </div>

</main>










<!--footer-->
<footer class="text-gray-100 bg-gray-600">
    <div class="max-w-3xl mx-auto py-6">
        <h1 class="text-center text-lg font-bold">
            Danfoss copyright 2025
        </h1>
        <!--suscribirse email-->
        <div class="flex justify-center mt-6">
            <div class="bg-white rounded-md">
                <div class="flex flex-wrap justify-between md:flex-row">
                    <label class="text-sm text-gray-700">
                        <input type="email" class="m-1 p-2 appearance-none text-black text-lg focus:outline-none focus:placeholder-transparent" placeholder="Ingresa tu email">
                    </label>
                    <button class="w-full m-1 p-2 text-lg font-bold bg-gray-900 hover:bg-red-400" >Suscribite</button>
                </div>
            </div>
        </div>

        <!--titulo bajo-->
        <div class="flex flex-col items-center justify-between mt-6 md:flex-row">
            <div>
                <a href="" class="text-xl font-bold text-gray-100 hover:text-gray-400">Danfoss</a>
            </div>

            <!--nav del footer-->
            <div>
                <div>
                    <a href="" class="px-4 text-sm text-gray-100 font-medium hover:text-gray-400">About</a>
                    <a href="" class="px-4 text-sm text-gray-100 font-medium hover:text-gray-400">Contacto</a>
                    <a href="" class="px-4 text-sm text-gray-100 font-medium hover:text-gray-400">Foro</a>

            </div>

    </div>
